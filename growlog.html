<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oui'd</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:        #111113;
    --bg2:       #18181b;
    --bg3:       #1e1e22;
    --bg4:       #242428;
    --border:    #2a2a2f;
    --border2:   #34343b;
    --g1:        #1a2e1e;
    --g2:        #1e3d24;
    --g3:        #2d6b3a;
    --g4:        #4ade80;
    --g5:        #86efac;
    --g6:        #bbf7d0;
    --text:      #e4e4e7;
    --text2:     #a1a1aa;
    --text3:     #52525b;
    --warn:      #fbbf24;
    --danger:    #7f1d1d;
    --red:       #f87171;
    --mono:      'DM Mono', monospace;
    --sans:      'DM Sans', sans-serif;
    --radius:    14px;
    --radius-sm: 8px;
    --radius-xs: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--g4);
  }
  .logo span { color: var(--text3); font-weight: 400; }
  .header-actions { display: flex; gap: 8px; }

  /* ── NAV ── */
  nav {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 10px 18px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--text3);
    cursor: pointer;
    border: none;
    background: none;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .nav-tab:hover { color: var(--text2); }
  .nav-tab.active { color: var(--g4); border-bottom-color: var(--g4); }

  /* ── MAIN ── */
  main { padding: 20px; max-width: 900px; margin: 0 auto; }

  .view { display: none; }
  .view.active { display: block; }

  /* ── PLANT GRID ── */
  .plant-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .plant-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .plant-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .plant-card.selected { border-color: var(--g3); }

  .plant-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .plant-id {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.04em;
    margin-bottom: 3px;
    font-family: var(--mono);
  }
  .plant-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .stage-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--g1);
    color: var(--g4);
    border: 1px solid var(--g2);
  }
  .stage-badge.seedling { background: rgba(134,239,172,0.08); color: #86efac; border-color: rgba(134,239,172,0.15); }
  .stage-badge.veg      { background: rgba(74,222,128,0.1);   color: #4ade80; border-color: rgba(74,222,128,0.2); }
  .stage-badge.flower   { background: rgba(167,139,250,0.1);  color: #c4b5fd; border-color: rgba(167,139,250,0.2); }
  .stage-badge.flush    { background: rgba(251,191,36,0.08);  color: #fde68a; border-color: rgba(251,191,36,0.15); }
  .stage-badge.harvest  { background: rgba(248,113,113,0.08); color: #fca5a5; border-color: rgba(248,113,113,0.15); }

  .plant-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }
  .stat {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .stat-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; font-weight: 400; }
  .stat-value { font-size: 14px; color: var(--text); font-weight: 600; font-family: var(--mono); }
  .stat-value.ok   { color: var(--g4); }
  .stat-value.warn { color: var(--warn); }
  .stat-value.bad  { color: var(--red); }

  .vpd-bar-wrap { margin-bottom: 12px; }
  .vpd-label-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .vpd-bar {
    height: 5px;
    background: var(--bg4);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }
  .vpd-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s;
  }
  .vpd-zone-ok   { background: var(--g4); }
  .vpd-zone-low  { background: var(--warn); }
  .vpd-zone-high { background: var(--red); }

  .plant-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text3);
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .concern-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--warn);
    display: inline-block;
    margin-right: 4px;
  }

  .add-plant-card {
    background: var(--bg2);
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text3);
    font-size: 13px;
    font-weight: 500;
    gap: 8px;
    transition: all 0.2s;
    min-height: 180px;
  }
  .add-plant-card:hover { border-color: var(--g3); color: var(--g4); background: rgba(74,222,128,0.03); }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* ── BUTTONS ── */
  .btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.01em;
    padding: 8px 16px;
    border-radius: 99px;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
  }
  .btn-primary {
    background: var(--g4);
    color: #0a1a0f;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--g5); }
  .btn-ghost {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text3); background: var(--bg4); }
  .btn-danger {
    background: none;
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.3);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .btn-icon {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 6px;
    font-size: 14px;
    border-radius: var(--radius-xs);
    transition: all 0.15s;
  }
  .btn-icon:hover { color: var(--text); background: var(--bg3); }

  /* ── FORMS ── */
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--g4);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.1);
  }
  .form-select { appearance: none; cursor: pointer; }
  .form-textarea { resize: vertical; min-height: 80px; font-family: var(--sans); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* ── DETAIL VIEW ── */
  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-photo {
    width: 72px; height: 72px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    cursor: pointer;
    overflow: hidden;
    flex-shrink: 0;
  }
  .detail-photo img { width: 100%; height: 100%; object-fit: cover; }
  .detail-meta { flex: 1; }
  .detail-name { font-size: 20px; color: var(--text); font-weight: 600; margin-bottom: 4px; letter-spacing: -0.02em; }
  .detail-strain { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .metric-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .metric-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .metric-value { font-size: 18px; color: var(--text); font-weight: 600; font-family: var(--mono); }
  .metric-unit { font-size: 11px; color: var(--text3); margin-left: 2px; font-family: var(--sans); font-weight: 400; }

  /* ── PANELS ── */
  .panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.02em;
  }
  .panel-body { padding: 16px 18px; }
  .panel-toggle { color: var(--text3); font-size: 10px; transition: transform 0.2s; }
  .panel.collapsed .panel-body { display: none; }
  .panel.collapsed .panel-toggle { transform: rotate(-90deg); }

  /* ── JOURNAL ── */
  .journal-entry {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .journal-entry:last-child { border-bottom: none; }
  .journal-date { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .journal-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .journal-tags-row { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .journal-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 99px;
    background: rgba(74,222,128,0.08);
    color: var(--g4);
    border: 1px solid rgba(74,222,128,0.15);
  }

  /* ── SCHEDULE TABLE ── */
  .schedule-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--sans);
  }
  .schedule-table th {
    text-align: left;
    color: var(--text3);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }
  .schedule-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .schedule-table tr:last-child td { border-bottom: none; }
  .schedule-table tr:hover td { background: var(--bg3); }

  /* ── TRAINING LOG ── */
  .training-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .training-row:last-child { border-bottom: none; }
  .training-date { color: var(--text3); font-size: 11px; min-width: 80px; font-weight: 500; padding-top: 2px; }
  .training-type {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 99px;
    background: rgba(167,139,250,0.1);
    color: #c4b5fd;
    border: 1px solid rgba(167,139,250,0.2);
    min-width: 60px;
    text-align: center;
    flex-shrink: 0;
  }
  .training-note { color: var(--text2); flex: 1; }

  /* ── REMINDERS ── */
  .reminder-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .reminder-item:last-child { border-bottom: none; }
  .reminder-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .reminder-dot.water  { background: #60a5fa; }
  .reminder-dot.feed   { background: var(--g4); }
  .reminder-dot.check  { background: var(--warn); }
  .reminder-dot.train  { background: #c4b5fd; }
  .reminder-info { flex: 1; }
  .reminder-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .reminder-due  { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .reminder-due.overdue { color: var(--red); font-weight: 500; }

  /* ── DASHBOARD ── */
  .dash-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .dash-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .dash-card-title { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.03em; text-transform: uppercase; }
  .dash-num { font-size: 32px; color: var(--text); font-weight: 300; font-family: var(--mono); }
  .dash-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── CONCERN STRIP ── */
  .concern-strip {
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--red);
  }

  /* ── PHOTO GRID ── */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: var(--radius-xs);
    object-fit: cover;
    background: var(--bg3);
    border: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3);
    font-size: 11px;
    transition: border-color 0.15s;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-add {
    border: 1.5px dashed var(--border2);
    cursor: pointer;
  }
  .photo-add:hover { border-color: var(--g4); color: var(--g4); }

  /* ── VPD GAUGE ── */
  .vpd-info {
    font-size: 12px;
    color: var(--text3);
    margin-top: 8px;
    line-height: 1.5;
  }
  .vpd-range-bar {
    height: 8px;
    border-radius: 99px;
    background: linear-gradient(to right, #3b3b8f 0%, var(--warn) 25%, var(--g3) 45%, var(--g4) 65%, var(--red) 85%, #7f1d1d 100%);
    position: relative;
    margin: 10px 0 6px;
  }
  .vpd-pointer {
    position: absolute;
    top: -5px;
    width: 3px;
    height: 18px;
    background: #fff;
    border-radius: 2px;
    transform: translateX(-50%);
    transition: left 0.4s;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }
  .vpd-scale {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── HARVEST PANEL ── */
  .harvest-row {
    display: flex;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .harvest-row:last-child { border-bottom: none; }
  .harvest-label { color: var(--text3); min-width: 130px; font-size: 11px; font-weight: 500; }
  .harvest-val   { color: var(--text); }

  /* ── MISC ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-size: 13px;
    line-height: 2;
  }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text3);
    cursor: pointer; margin-bottom: 16px;
    background: none; border: none;
    font-family: var(--sans);
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--g4); }
  input[type="file"] { display: none; }

  .inline-edit {
    background: none;
    border: none;
    border-bottom: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: inherit;
    outline: none;
    padding: 2px 0;
  }
  .inline-edit:focus { border-bottom-color: var(--g4); }

  .checkrow {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
  }
  .checkrow input { accent-color: var(--g4); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
</style>
</head>
<body>

<header>
  <div class="logo">Oui'd</div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportData()">Export</button>
    <button class="btn btn-primary btn-sm" onclick="openAddPlant()">+ Plant</button>
  </div>
</header>

<nav>
  <button class="nav-tab active" onclick="switchTab('overview')" id="tab-overview">Overview</button>
  <button class="nav-tab" onclick="switchTab('plants')" id="tab-plants">Plants</button>
  <button class="nav-tab" onclick="switchTab('reminders')" id="tab-reminders">Reminders</button>
  <button class="nav-tab" onclick="switchTab('schedule')" id="tab-schedule">Schedule</button>

<script>
// ── STATE ──────────────────────────────────────────────
let state = {
  plants: [],
  reminders: [],
  schedule: [],
};
let editingPlantId = null;
let currentPlantId = null;
let prevView = 'plants';

function load() {
  const saved = localStorage.getItem('growlog_v2');
  if (saved) {
    try { state = JSON.parse(saved); }
    catch(e) { console.warn('load error', e); }
  }
}

function save() {
  localStorage.setItem('growlog_v2', JSON.stringify(state));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function today() {
  return new Date().toISOString().split('T')[0];
}

function daysAgo(dateStr) {
  if (!dateStr) return 0;
  return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
}

function formatDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

// ── VPD ────────────────────────────────────────────────
// VPD (kPa) = saturation vapour pressure × (1 - RH/100)
// SVP (kPa) = 0.6108 × e^(17.27×T / (T+237.3))
function calcVPD(tempC, rh) {
  if (!tempC || !rh) return null;
  const svp = 0.6108 * Math.exp(17.27 * tempC / (tempC + 237.3));
  return +(svp * (1 - rh / 100)).toFixed(2);
}

function vpdStatus(vpd, stage) {
  if (!vpd) return { label: '—', cls: '' };
  // Ideal ranges: seedling 0.4-0.8, veg 0.8-1.2, flower 1.0-1.5
  const ranges = {
    seedling: [0.4, 0.8],
    veg:      [0.8, 1.2],
    flower:   [1.0, 1.5],
    flush:    [0.8, 1.3],
    harvest:  [0.8, 1.5],
  };
  const [lo, hi] = ranges[stage] || [0.8, 1.3];
  if (vpd < lo) return { label: `${vpd} ↓`, cls: 'warn' };
  if (vpd > hi) return { label: `${vpd} ↑`, cls: 'bad' };
  return { label: `${vpd}`, cls: 'ok' };
}

function vpdPercent(vpd) {
  // Scale 0–2.5 kPa to 0–100%
  return Math.min(100, Math.max(0, (vpd / 2.5) * 100));
}

function vpdFillClass(vpd) {
  if (vpd < 0.4) return 'vpd-zone-low';
  if (vpd > 1.5) return 'vpd-zone-high';
  return 'vpd-zone-ok';
}

// ── TABS ───────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'overview') renderOverview();
  if (tab === 'plants') renderPlants();
  if (tab === 'reminders') renderReminders();
  if (tab === 'schedule') renderSchedule();
}

// ── PLANT CARD HTML ────────────────────────────────────
function plantCardHTML(p) {
  const age = daysAgo(p.germDate);
  const vpd = calcVPD(p.temp, p.humidity);
  const vs = vpdStatus(vpd, p.stage);
  const vpdW = vpd ? vpdPercent(vpd) : 0;
  const vpdClass = vpd ? vpdFillClass(vpd) : '';
  const moisture = p.moisture || '—';
  const mClass = p.moisture ? (p.moisture < 30 ? 'bad' : p.moisture > 80 ? 'warn' : 'ok') : '';
  const ph = p.ph || '—';
  const phClass = p.ph ? (p.ph < 5.5 || p.ph > 7.0 ? 'bad' : (p.ph < 5.8 || p.ph > 6.8 ? 'warn' : 'ok')) : '';
  const hasConcern = p.concerns && p.concerns.trim().length > 0;

  return `
  <div class="plant-card" onclick="openPlant('${p.id}')">
    <div class="plant-card-header">
      <div>
        <div class="plant-id">${p.id || '—'}</div>
        <div class="plant-name">${p.name}</div>
      </div>
      <div class="stage-badge ${p.stage}">${p.stage.toUpperCase()}</div>
    </div>
    <div class="plant-stats">
      <div class="stat">
        <div class="stat-label">AGE</div>
        <div class="stat-value">${age}d</div>
      </div>
      <div class="stat">
        <div class="stat-label">MOISTURE</div>
        <div class="stat-value ${mClass}">${moisture}${p.moisture ? '%' : ''}</div>
      </div>
      <div class="stat">
        <div class="stat-label">pH</div>
        <div class="stat-value ${phClass}">${ph}</div>
      </div>
      <div class="stat">
        <div class="stat-label">EC</div>
        <div class="stat-value">${p.ec ? p.ec + ' mS' : '—'}</div>
      </div>
    </div>
    ${vpd !== null ? `
    <div class="vpd-bar-wrap">
      <div class="vpd-label-row"><span>VPD</span><span class="${vs.cls}">${vs.label} kPa</span></div>
      <div class="vpd-bar"><div class="vpd-fill ${vpdClass}" style="width:${vpdW}%"></div></div>
    </div>` : ''}
    <div class="plant-card-footer">
      <span>${p.strain || 'Unknown strain'} · ${p.lightCycle || '—'}</span>
      <span>${hasConcern ? '<span class="concern-dot"></span>Concern' : ''}</span>
    </div>
  </div>`;
}

// ── OVERVIEW ───────────────────────────────────────────
function renderOverview() {
  const active = state.plants.filter(p => p.stage !== 'harvest');
  const concerns = state.plants.filter(p => p.concerns && p.concerns.trim());

  const cEl = document.getElementById('overview-concerns');
  cEl.innerHTML = concerns.map(p => `
    <div class="concern-strip">
      <span>⚠</span>
      <span><strong>${p.name}</strong> — ${p.concerns}</span>
    </div>`).join('');

  const stats = document.getElementById('dash-stats');
  const totalHarvest = state.plants.filter(p => p.harvest).reduce((a, p) => a + (p.harvest.dry || 0), 0);
  stats.innerHTML = `
    <div class="dash-card">
      <div class="dash-card-title">Active plants</div>
      <div class="dash-num">${active.length}</div>
      <div class="dash-sub">${state.plants.length} total tracked</div>
    </div>
    <div class="dash-card">
      <div class="dash-card-title">Total yield</div>
      <div class="dash-num">${totalHarvest}g</div>
      <div class="dash-sub">dry weight across harvests</div>
    </div>`;

  const grid = document.getElementById('overview-plant-grid');
  grid.innerHTML = active.map(plantCardHTML).join('') +
    `<div class="add-plant-card" onclick="openAddPlant()"><span style="font-size:20px;color:var(--g3)">+</span> New plant</div>`;
}

// ── PLANTS ─────────────────────────────────────────────
function renderPlants() {
  const grid = document.getElementById('plants-grid');
  grid.innerHTML = state.plants.map(plantCardHTML).join('') +
    `<div class="add-plant-card" onclick="openAddPlant()"><span style="font-size:20px;color:var(--g3)">+</span> New plant</div>`;
}

// ── PLANT DETAIL ───────────────────────────────────────
function openPlant(id) {
  currentPlantId = id;
  prevView = document.querySelector('.nav-tab.active').id.replace('tab-', '');
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-detail').classList.add('active');
  renderDetail(id);
}

function backToPlants() {
  switchTab(prevView);
  currentPlantId = null;
}

function renderDetail(id) {
  const p = state.plants.find(x => x.id === id);
  if (!p) return;

  const age = daysAgo(p.germDate);
  const vpd = calcVPD(p.temp, p.humidity);
  const vs = vpdStatus(vpd, p.stage);
  const vpdW = vpd ? vpdPercent(vpd) : 50;
  const photos = p.photos || [];

  const journalHTML = (p.journal || []).slice().reverse().map(j => `
    <div class="journal-entry">
      <div class="journal-date">${formatDate(j.date)}</div>
      <div class="journal-text">${j.text}</div>
      ${j.tags && j.tags.length ? `<div class="journal-tags-row">${j.tags.map(t => `<span class="journal-tag">${t}</span>`).join('')}</div>` : ''}
    </div>`).join('') || '<div class="empty-state">No entries yet.</div>';

  const trainingHTML = (p.training || []).slice().reverse().map(t => `
    <div class="training-row">
      <span class="training-date">${formatDate(t.date)}</span>
      <span class="training-type">${t.type}</span>
      <span class="training-note">${t.note || ''}</span>
    </div>`).join('') || '<div class="empty-state">No training logged.</div>';

  const harvestSection = p.harvest ? `
    <div class="harvest-row"><span class="harvest-label">Harvest date</span><span class="harvest-val">${formatDate(p.harvest.date)}</span></div>
    <div class="harvest-row"><span class="harvest-label">Wet weight</span><span class="harvest-val">${p.harvest.wet || '—'}g</span></div>
    <div class="harvest-row"><span class="harvest-label">Dry weight</span><span class="harvest-val">${p.harvest.dry || '—'}g</span></div>
    <div class="harvest-row"><span class="harvest-label">Cure complete</span><span class="harvest-val">${formatDate(p.harvest.cure)}</span></div>
    ${p.harvest.notes ? `<div class="harvest-row"><span class="harvest-label">Notes</span><span class="harvest-val">${p.harvest.notes}</span></div>` : ''}
  ` : '<div class="empty-state">Not harvested yet.</div>';

  const photosHTML = photos.map(ph => `
    <div class="photo-thumb"><img src="${ph}" onclick="event.stopPropagation()"></div>`).join('') +
    `<div class="photo-thumb photo-add" onclick="triggerPhotoUpload()">+ Photo</div>`;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-photo" onclick="triggerPhotoUpload()">
        ${photos.length ? `<img src="${photos[photos.length-1]}">` : '🌿'}
      </div>
      <div class="detail-meta">
        <div class="detail-name">${p.name}</div>
        <div class="detail-strain">${p.strain || 'Unknown strain'} · ${p.medium || '—'} · ${p.potSize ? p.potSize + 'L pot' : '—'}</div>
        <div class="detail-tags">
          <span class="stage-badge ${p.stage}">${p.stage.charAt(0).toUpperCase() + p.stage.slice(1)}</span>
          <span class="tag">${age}d old</span>
          <span class="tag">${p.lightCycle || '—'} light</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm" onclick="openEditPlant('${p.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deletePlant('${p.id}')">Delete</button>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Temp</div>
        <div class="metric-value">${p.temp || '—'}<span class="metric-unit">°C</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Humidity</div>
        <div class="metric-value">${p.humidity || '—'}<span class="metric-unit">%</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">VPD</div>
        <div class="metric-value" style="color:var(--${vs.cls === 'ok' ? 'g4' : vs.cls === 'warn' ? 'warn' : 'red'})">${vpd !== null ? vpd : '—'}<span class="metric-unit">kPa</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">pH</div>
        <div class="metric-value">${p.ph || '—'}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">EC</div>
        <div class="metric-value">${p.ec || '—'}<span class="metric-unit">mS</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Moisture</div>
        <div class="metric-value">${p.moisture || '—'}<span class="metric-unit">${p.moisture ? '%' : ''}</span></div>
      </div>
    </div>

    ${vpd !== null ? `
    <div class="panel" style="margin-bottom:12px;">
      <div class="panel-body">
        <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;">VPD — Vapour pressure deficit</div>
        <div class="vpd-range-bar">
          <div class="vpd-pointer" style="left:${vpdW}%"></div>
        </div>
        <div class="vpd-scale"><span>0</span><span>0.4</span><span>0.8</span><span>1.2</span><span>1.6</span><span>2.0</span><span>2.5</span></div>
        <div class="vpd-info">
          Current: <strong style="color:var(--${vs.cls === 'ok' ? 'g4' : vs.cls === 'warn' ? 'warn' : 'red'})">${vpd} kPa</strong>
          ${vs.cls === 'ok' ? '— optimal for ' + p.stage : vs.cls === 'warn' ? '— below optimal · increase temp or lower humidity' : '— above optimal · lower temp or increase humidity'}
        </div>
      </div>
    </div>` : ''}

    ${p.concerns ? `<div class="concern-strip"><span>⚠</span><span>${p.concerns}</span></div>` : ''}

    <div class="panel">
      <div class="panel-header" onclick="togglePanel(this)">
        <span class="panel-title">Photos</span>
        <span class="panel-toggle">▼</span>
      </div>
      <div class="panel-body">
        <div class="photo-grid">${photosHTML}</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header" onclick="togglePanel(this)">
        <span class="panel-title">Daily journal</span>
        <span class="panel-toggle">▼</span>
      </div>
      <div class="panel-body">
        <div style="margin-bottom:12px;">
          <button class="btn btn-ghost btn-sm" onclick="openJournal('${p.id}')">+ Add entry</button>
        </div>
        ${journalHTML}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header" onclick="togglePanel(this)">
        <span class="panel-title">Training log</span>
        <span class="panel-toggle">▼</span>
      </div>
      <div class="panel-body">
        <div style="margin-bottom:12px;">
          <button class="btn btn-ghost btn-sm" onclick="openTraining('${p.id}')">+ Log</button>
        </div>
        ${trainingHTML}
      </div>
    </div>

    <div class="panel">
      <div class="panel-header" onclick="togglePanel(this)">
        <span class="panel-title">Harvest record</span>
        <span class="panel-toggle">▼</span>
      </div>
      <div class="panel-body">
        <div style="margin-bottom:12px;">
          <button class="btn btn-ghost btn-sm" onclick="openHarvest('${p.id}')">+ Log harvest</button>
        </div>
        ${harvestSection}
      </div>
    </div>
  `;
}

function togglePanel(header) {
  header.parentElement.classList.toggle('collapsed');
  header.querySelector('.panel-toggle').textContent =
    header.parentElement.classList.contains('collapsed') ? '▶' : '▼';
}

// ── ADD / EDIT PLANT ───────────────────────────────────
function openAddPlant() {
  editingPlantId = null;
  document.getElementById('plant-modal-title').textContent = 'New plant';
  ['name','strain','temp','humidity','ph','ec','moisture','pot','concerns'].forEach(f => {
    document.getElementById('f-'+f).value = '';
  });
  document.getElementById('f-stage').value = 'veg';
  document.getElementById('f-light').value = '18/6';
  document.getElementById('f-medium').value = 'soil';
  document.getElementById('f-germ').value = today();
  openModal('modal-plant');
}

function openEditPlant(id) {
  const p = state.plants.find(x => x.id === id);
  if (!p) return;
  editingPlantId = id;
  document.getElementById('plant-modal-title').textContent = 'Edit plant';
  document.getElementById('f-name').value = p.name || '';
  document.getElementById('f-strain').value = p.strain || '';
  document.getElementById('f-stage').value = p.stage || 'veg';
  document.getElementById('f-germ').value = p.germDate || '';
  document.getElementById('f-light').value = p.lightCycle || '18/6';
  document.getElementById('f-medium').value = p.medium || 'soil';
  document.getElementById('f-pot').value = p.potSize || '';
  document.getElementById('f-temp').value = p.temp || '';
  document.getElementById('f-humidity').value = p.humidity || '';
  document.getElementById('f-ph').value = p.ph || '';
  document.getElementById('f-ec').value = p.ec || '';
  document.getElementById('f-moisture').value = p.moisture || '';
  document.getElementById('f-concerns').value = p.concerns || '';
  openModal('modal-plant');
}

function savePlant() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;
  const data = {
    name,
    strain:     document.getElementById('f-strain').value.trim(),
    stage:      document.getElementById('f-stage').value,
    germDate:   document.getElementById('f-germ').value,
    lightCycle: document.getElementById('f-light').value,
    medium:     document.getElementById('f-medium').value,
    potSize:    document.getElementById('f-pot').value,
    temp:       parseFloat(document.getElementById('f-temp').value) || null,
    humidity:   parseFloat(document.getElementById('f-humidity').value) || null,
    ph:         parseFloat(document.getElementById('f-ph').value) || null,
    ec:         parseFloat(document.getElementById('f-ec').value) || null,
    moisture:   parseFloat(document.getElementById('f-moisture').value) || null,
    concerns:   document.getElementById('f-concerns').value.trim(),
  };

  if (editingPlantId) {
    const idx = state.plants.findIndex(x => x.id === editingPlantId);
    state.plants[idx] = { ...state.plants[idx], ...data };
  } else {
    data.id = 'P-' + String(state.plants.length + 1).padStart(2,'0');
    data.photos = [];
    data.journal = [];
    data.training = [];
    state.plants.push(data);
  }

  save();
  closeModal('modal-plant');
  if (currentPlantId) renderDetail(currentPlantId);
  else renderOverview();
}

function deletePlant(id) {
  if (!confirm('Delete this plant? This cannot be undone.')) return;
  state.plants = state.plants.filter(x => x.id !== id);
  save();
  backToPlants();
}

// ── JOURNAL ────────────────────────────────────────────
function openJournal(id) {
  currentPlantId = id;
  document.getElementById('j-date').value = today();
  document.getElementById('j-text').value = '';
  document.querySelectorAll('#modal-journal input[type=checkbox]').forEach(c => c.checked = false);
  openModal('modal-journal');
}

function saveJournalEntry() {
  const text = document.getElementById('j-text').value.trim();
  if (!text) return;
  const tags = [...document.querySelectorAll('#modal-journal input[type=checkbox]:checked')].map(c => c.value);
  const p = state.plants.find(x => x.id === currentPlantId);
  if (!p) return;
  if (!p.journal) p.journal = [];
  p.journal.push({ date: document.getElementById('j-date').value, text, tags });
  save();
  closeModal('modal-journal');
  renderDetail(currentPlantId);
}

// ── TRAINING ───────────────────────────────────────────
function openTraining(id) {
  currentPlantId = id;
  document.getElementById('tr-date').value = today();
  document.getElementById('tr-note').value = '';
  openModal('modal-training');
}

function saveTraining() {
  const p = state.plants.find(x => x.id === currentPlantId);
  if (!p) return;
  if (!p.training) p.training = [];
  p.training.push({
    date: document.getElementById('tr-date').value,
    type: document.getElementById('tr-type').value,
    note: document.getElementById('tr-note').value.trim(),
  });
  save();
  closeModal('modal-training');
  renderDetail(currentPlantId);
}

// ── HARVEST ────────────────────────────────────────────
function openHarvest(id) {
  currentPlantId = id;
  document.getElementById('h-date').value = today();
  ['h-wet','h-dry','h-notes','h-cure'].forEach(f => document.getElementById(f).value = '');
  openModal('modal-harvest');
}

function saveHarvest() {
  const p = state.plants.find(x => x.id === currentPlantId);
  if (!p) return;
  p.harvest = {
    date: document.getElementById('h-date').value,
    wet:  parseFloat(document.getElementById('h-wet').value) || null,
    dry:  parseFloat(document.getElementById('h-dry').value) || null,
    cure: document.getElementById('h-cure').value,
    notes: document.getElementById('h-notes').value.trim(),
  };
  p.stage = 'harvest';
  save();
  closeModal('modal-harvest');
  renderDetail(currentPlantId);
}

// ── REMINDERS ──────────────────────────────────────────
function openAddReminder() {
  document.getElementById('r-label').value = '';
  document.getElementById('r-date').value = today();
  openModal('modal-reminder');
}

function saveReminder() {
  const label = document.getElementById('r-label').value.trim();
  if (!label) return;
  state.reminders.push({
    id: uid(),
    label,
    date: document.getElementById('r-date').value,
    type: document.getElementById('r-type').value,
    done: false,
  });
  save();
  closeModal('modal-reminder');
  renderReminders();
}

function renderReminders() {
  const sorted = [...state.reminders].sort((a,b) => a.date.localeCompare(b.date));
  const el = document.getElementById('reminders-list');
  if (!sorted.length) {
    el.innerHTML = '<div class="empty-state">No reminders set.</div>';
    return;
  }
  el.innerHTML = sorted.map(r => {
    const overdue = r.date < today() && !r.done;
    return `<div class="reminder-item" style="${r.done ? 'opacity:.4' : ''}">
      <div class="reminder-dot ${r.type}"></div>
      <div class="reminder-info">
        <div class="reminder-name">${r.label}</div>
        <div class="reminder-due ${overdue ? 'overdue' : ''}">${formatDate(r.date)} ${overdue ? '· Overdue' : ''}</div>
      </div>
      <div style="display:flex;gap:6px;">
        ${!r.done ? `<button class="btn btn-ghost btn-sm" onclick="doneReminder('${r.id}')">Done</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteReminder('${r.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function doneReminder(id) {
  const r = state.reminders.find(x => x.id === id);
  if (r) r.done = true;
  save();
  renderReminders();
}

function deleteReminder(id) {
  state.reminders = state.reminders.filter(x => x.id !== id);
  save();
  renderReminders();
}

// ── SCHEDULE ───────────────────────────────────────────
function openAddSchedule() {
  ['sc-week','sc-water','sc-ph','sc-ec','sc-nutes'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('sc-stage').value = 'veg';
  openModal('modal-schedule');
}

function saveScheduleEntry() {
  state.schedule.push({
    id: uid(),
    week:      parseInt(document.getElementById('sc-week').value) || 1,
    stage:     document.getElementById('sc-stage').value,
    water:     document.getElementById('sc-water').value,
    ph:        document.getElementById('sc-ph').value,
    ec:        document.getElementById('sc-ec').value,
    nutrients: document.getElementById('sc-nutes').value.trim(),
  });
  state.schedule.sort((a,b) => a.week - b.week);
  save();
  closeModal('modal-schedule');
  renderSchedule();
}

function renderSchedule() {
  const tbody = document.getElementById('schedule-tbody');
  if (!state.schedule.length) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:24px;">No schedule entries yet.</td></tr>`;
    return;
  }
  tbody.innerHTML = state.schedule.map(s => `
    <tr>
      <td>${s.week}</td>
      <td><span class="stage-badge ${s.stage}">${s.stage.charAt(0).toUpperCase() + s.stage.slice(1)}</span></td>
      <td>${s.water || '—'}</td>
      <td style="color:var(--text2)">${s.nutrients || '—'}</td>
      <td>${s.ph || '—'}</td>
      <td>${s.ec || '—'}</td>
      <td><button class="btn-icon" onclick="deleteSchedule('${s.id}')">✕</button></td>
    </tr>`).join('');
}

function deleteSchedule(id) {
  state.schedule = state.schedule.filter(x => x.id !== id);
  save();
  renderSchedule();
}

// ── PHOTOS ─────────────────────────────────────────────
function triggerPhotoUpload() {
  document.getElementById('photo-upload').click();
}

function handlePhotoUpload(evt) {
  const file = evt.target.files[0];
  if (!file || !currentPlantId) return;
  const reader = new FileReader();
  reader.onload = e => {
    const p = state.plants.find(x => x.id === currentPlantId);
    if (p) {
      if (!p.photos) p.photos = [];
      p.photos.push(e.target.result);
      save();
      renderDetail(currentPlantId);
    }
  };
  reader.readAsDataURL(file);
  evt.target.value = '';
}

// ── EXPORT ─────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `growlog_${today()}.json`;
  a.click();
}

// ── MODAL HELPERS ──────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

      ],

// ── INIT ───────────────────────────────────────────────
load();
seedIfEmpty();
renderOverview();
</script>
